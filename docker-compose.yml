version: "3.9"

services:
  # ────────────────────────────────────────────
  # MySQL 数据库
  # ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: projecthub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-chennan}
      MYSQL_DATABASE: projecthub
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-chennan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # ASP.NET Core 后端 API
  # ────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: projecthub-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=projecthub;User=root;Password=${MYSQL_ROOT_PASSWORD:-chennan};
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY:-}
      - DeepSeek__BaseUrl=https://api.deepseek.com/v1
      - DeepSeek__Model=deepseek-chat
    ports:
      - "5000:8080"
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # Vue 3 前端（Nginx 托管）
  # ────────────────────────────────────────────
  frontend:
    build:
      context: ./projecthub
      dockerfile: Dockerfile
    container_name: projecthub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
