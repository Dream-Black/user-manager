name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 递增版本号
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh
          cat version.json

      - name: 提交版本更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION version.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push origin main || echo "版本已是最新，无需提交"

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 复制版本信息到构建目录
        run: |
          cp version.json projecthub/
          cp version.json projecthub/dist/

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

      - name: 上传版本文件
        uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: |
            VERSION
            version.json
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          debug: true
          script: |
            echo "===== SSH 连接测试成功 ====="
            echo "主机名: $(hostname)"
            echo "当前用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "Docker: $(docker --version 2>/dev/null || echo '未安装')"
            echo "Docker Compose: $(docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo '未安装')"
            df -h / | head -2
            
      - name: 下载版本文件
        uses: actions/download-artifact@v4
        with:
          name: version-file
          path: ./

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "部署版本: $VERSION"

      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: false
          script: |
            echo "===== 开始部署 ====="
            
            # 切换到项目目录
            cd /opt/projecthub
            pwd
            
            # 更新代码（保留数据卷）
            echo "更新代码..."
            if [ -d .git ]; then
              git fetch origin
              git reset --hard origin/main
            else
              echo "错误: 不是有效的 Git 仓库"
              exit 1
            fi
            
            echo "文件列表:"
            ls -la
            
            # 创建 .env（如果不存在则创建）
            echo "检查 .env 配置..."
            if [ ! -f .env ]; then
              echo "创建新的 .env 文件..."
              echo "MYSQL_ROOT_PASSWORD=ProjectHub@2026!Secure#Pass" > .env
              echo "DEEPSEEK_API_KEY=" >> .env
            else
              echo "保留现有的 .env 配置"
            fi
            
            # 生成版本信息（不追加，直接更新或创建）
            echo "生成版本信息..."
            VERSION="${{ steps.version.outputs.version }}"
            BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            
            # 使用 sed 更新或追加变量
            if grep -q "^APP_VERSION=" .env 2>/dev/null; then
              sed -i "s|^APP_VERSION=.*|APP_VERSION=$VERSION|" .env
            else
              echo "APP_VERSION=$VERSION" >> .env
            fi
            
            if grep -q "^BUILD_DATE=" .env 2>/dev/null; then
              sed -i "s|^BUILD_DATE=.*|BUILD_DATE=$BUILD_DATE|" .env
            else
              echo "BUILD_DATE=$BUILD_DATE" >> .env
            fi
            
            if grep -q "^GIT_COMMIT=" .env 2>/dev/null; then
              sed -i "s|^GIT_COMMIT=.*|GIT_COMMIT=$GIT_COMMIT|" .env
            else
              echo "GIT_COMMIT=$GIT_COMMIT" >> .env
            fi
            
            echo "版本: $VERSION, 构建日期: $BUILD_DATE, 提交: $GIT_COMMIT"
            
            # 检查网络配置
            echo "检查网络配置..."
            NETWORK_NAME="projecthub_default"
            if ! docker network inspect $NETWORK_NAME >/dev/null 2>&1; then
              NETWORK_NAME="projecthub-network"
              if ! docker network inspect $NETWORK_NAME >/dev/null 2>&1; then
                echo "创建项目网络..."
                NETWORK_NAME=$(docker network create projecthub-network)
              fi
            fi
            echo "使用网络: $NETWORK_NAME"
            
            # 部署
            echo "部署服务..."
            
            # 清理所有 projecthub 容器（除了 MySQL）
            docker stop projecthub-frontend projecthub-api 2>/dev/null || true
            docker rm -f projecthub-frontend projecthub-api 2>/dev/null || true
            
            # 使用 docker-compose 完整部署
            docker-compose -f docker-compose.prod.yml up -d --build
            
            echo "等待容器启动..."
            sleep 5
            
            # 获取容器 IP 并更新 Nginx 配置
            echo "更新 Nginx 配置..."
            
            # 获取前端容器 IP
            FRONTEND_IP=$(docker inspect projecthub-frontend --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null || echo "")
            if [ -n "$FRONTEND_IP" ]; then
              echo "前端容器 IP: $FRONTEND_IP"
            else
              echo "警告: 无法获取前端容器 IP"
            fi
            
            # 获取 API 容器 IP
            API_IP=$(docker inspect projecthub-api --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null || echo "")
            if [ -n "$API_IP" ]; then
              echo "API 容器 IP: $API_IP"
            else
              echo "警告: 无法获取 API 容器 IP"
            fi
            
            # 更新 Nginx 配置
            if [ -f /etc/nginx/sites-available/projecthub ] && [ -n "$FRONTEND_IP" ] && [ -n "$API_IP" ]; then
              echo "更新 Nginx 反向代理配置..."
              # 更新前端代理
              sudo sed -i "s|proxy_pass http://[^:]*:80;|proxy_pass http://$FRONTEND_IP:80;|g" /etc/nginx/sites-available/projecthub
              # 更新 API 代理
              sudo sed -i "s|proxy_pass http://[^:]*:8080;|proxy_pass http://$API_IP:8080;|g" /etc/nginx/sites-available/projecthub
              
              # 测试并重载 Nginx
              if sudo nginx -t; then
                sudo systemctl reload nginx
                echo "Nginx 配置已更新并重载"
              else
                echo "警告: Nginx 配置测试失败，跳过重载"
              fi
            else
              echo "跳过 Nginx 配置更新（配置文件不存在或无法获取容器 IP）"
            fi
            
            echo "完成!"
            docker-compose -f docker-compose.prod.yml ps
