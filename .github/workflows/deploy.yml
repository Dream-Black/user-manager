name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 下载镜像包
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: ./

      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: true
          script: |
            set -e
            echo "===== 诊断 ====="
            echo "主机: $(hostname)"
            echo "Docker: $(docker --version)"
            echo "磁盘空间: $(df -h / | tail -1)"
            echo "文件: $(ls -lh frontend.tar.gz 2>/dev/null || echo '不存在!')"
            echo "===== 开始部署 ====="
            docker stop projecthub-frontend 2>/dev/null || true
            docker rm projecthub-frontend 2>/dev/null || true
            echo "加载镜像..."
            zcat frontend.tar.gz | docker load
            docker tag frontend:latest projecthub-frontend:latest
            docker run -d \
              --name projecthub-frontend \
              --restart unless-stopped \
              -p 80:80 \
              projecthub-frontend:latest
            echo "===== 完成 ====="
            docker ps --filter "name=projecthub"
