name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/projecthub

jobs:
  # ══════════════════════════════════════════
  # JOB 1: 后端测试 & 构建镜像
  # ══════════════════════════════════════════
  build-api:
    name: "后端 - 构建 & 推送镜像"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: 还原依赖
        working-directory: api
        run: dotnet restore

      - name: 编译检查
        working-directory: api
        run: dotnet build --no-restore -c Release

      - name: 登录 GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送后端镜像
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

  # ══════════════════════════════════════════
  # JOB 2: 前端构建 & 推送镜像
  # ══════════════════════════════════════════
  build-frontend:
    name: "前端 - 构建 & 推送镜像"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: projecthub/package-lock.json

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 登录 GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送前端镜像
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: projecthub
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

  # ══════════════════════════════════════════
  # JOB 3: 部署到腾讯云服务器（仅 main/master push）
  # ══════════════════════════════════════════
  deploy:
    name: "部署到生产服务器"
    needs: [ build-api, build-frontend ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码（取 docker-compose.yml）
        uses: actions/checkout@v4

      - name: SSH 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/projecthub

            # 拉取最新代码（docker-compose.yml 等配置同步）
            git pull origin main || git pull origin master

            # 登录 GHCR 拉取最新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 更新并重启服务（滚动更新，数据库不受影响）
            docker compose pull api frontend
            docker compose up -d --no-deps api frontend

            # 清理旧镜像，节省磁盘
            docker image prune -f

            echo "✅ 部署完成！$(date)"
