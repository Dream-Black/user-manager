name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 下载镜像包
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: ./

      - name: 启动本地 HTTP 服务器
        run: |
          ls -lh frontend.tar.gz
          python3 -m http.server 8888 --directory . &
          sleep 2
          echo "HTTP 服务器已启动"

      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            echo "=== 1/6: 检查服务器环境 ==="
            echo "Docker: $(docker --version)"
            echo "磁盘: $(df -h / | tail -1 | awk '{print $3}')"
            echo "可用空间: $(df -h / | tail -1 | awk '{print $4}')"

            echo "=== 2/6: 清理旧容器 ==="
            docker stop projecthub-frontend 2>/dev/null || true
            docker rm projecthub-frontend 2>/dev/null || true

            echo "=== 3/6: 下载前端镜像 (约200MB) ==="
            # 从 runner 的 HTTP 服务器下载
            curl -s --progress-bar http://${{ secrets.SERVER_HOST }}:8888/frontend.tar.gz -o /tmp/frontend.tar.gz
            echo "下载完成: $(du -sh /tmp/frontend.tar.gz)"

            echo "=== 4/6: 加载镜像 ==="
            zcat /tmp/frontend.tar.gz | docker load
            docker tag frontend:latest projecthub-frontend:latest

            echo "=== 5/6: 启动容器 ==="
            docker run -d \
              --name projecthub-frontend \
              --restart unless-stopped \
              -p 80:80 \
              projecthub-frontend:latest

            echo "=== 6/6: 验证 ==="
            sleep 3
            curl -sf http://localhost/ && echo "前端运行正常" || echo "前端启动失败"
            docker ps --filter "name=projecthub"
            echo "=== 部署完成! ==="
