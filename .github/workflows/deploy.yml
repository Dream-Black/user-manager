name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════
  # JOB 1: 前端构建 & 推送镜像（仅需要这个）
  # ══════════════════════════════════════════
  build-frontend:
    name: "前端 - 构建 & 推送镜像"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送前端镜像
        run: |
          docker build -t "$REGISTRY/dream-black/projecthub-frontend:latest" -t "$REGISTRY/dream-black/projecthub-frontend:${{ github.sha }}" projecthub/
          docker push --all-tags "$REGISTRY/dream-black/projecthub-frontend"

  # ══════════════════════════════════════════
  # JOB 2: 部署到腾讯云（服务器能访问 GHCR）
  # ══════════════════════════════════════════
  deploy:
    name: "部署到生产服务器"
    needs: [ build-frontend ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出配置（取 docker-compose.prod.yml）
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: 传输配置并重启前端容器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # 更新配置
            cp docker-compose.prod.yml /opt/projecthub/

            # 登录 GHCR（从 runner 传入 token）
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取并重启前端
            docker compose -f /opt/projecthub/docker-compose.prod.yml pull frontend
            docker compose -f /opt/projecthub/docker-compose.prod.yml up -d frontend

            echo "=== 前端部署成功! ==="
            docker compose -f /opt/projecthub/docker-compose.prod.yml ps
