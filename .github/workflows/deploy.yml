name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 递增版本号
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh
          cat version.json

      - name: 提交版本更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION version.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push origin main || echo "版本已是最新，无需提交"

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 复制版本信息到构建目录
        run: |
          cp version.json projecthub/
          cp version.json projecthub/dist/

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

      - name: 上传版本文件
        uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: |
            VERSION
            version.json
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          debug: true
          script: |
            echo "===== SSH 连接测试成功 ====="
            echo "主机名: $(hostname)"
            echo "当前用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "Docker: $(docker --version 2>/dev/null || echo '未安装')"
            echo "Docker Compose: $(docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo '未安装')"
            df -h / | head -2
            
      - name: 下载版本文件
        uses: actions/download-artifact@v4
        with:
          name: version-file
          path: ./

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "部署版本: $VERSION"

      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: false
          script: |
            echo "===== 开始部署 ====="
            
            # 创建目录
            mkdir -p ~/projecthub
            cd ~/projecthub
            pwd
            
            # 更新代码（保留数据卷）
            echo "更新代码..."
            if [ -d ~/projecthub/.git ]; then
              cd ~/projecthub
              git fetch origin
              git reset --hard origin/main
            else
              mkdir -p ~/projecthub
              cd ~/projecthub
              git clone https://github.com/Dream-Black/user-manager.git .
            fi
            
            echo "文件列表:"
            ls -la
            
            # 创建 .env
            echo "创建 .env..."
            echo "MYSQL_ROOT_PASSWORD=chennan" > .env
            echo "DEEPSEEK_API_KEY=" >> .env
            
            # 生成版本信息
            echo "生成版本信息..."
            VERSION="${{ steps.version.outputs.version }}"
            BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            echo "APP_VERSION=$VERSION" >> .env
            echo "BUILD_DATE=$BUILD_DATE" >> .env
            echo "GIT_COMMIT=$GIT_COMMIT" >> .env
            echo "版本: $VERSION, 构建日期: $BUILD_DATE, 提交: $GIT_COMMIT"
            
            # 部署
            echo "部署服务..."
            
            # 清理所有 projecthub 容器（除了 MySQL）
            docker stop projecthub-frontend projecthub-api 2>/dev/null || true
            docker rm -f projecthub-frontend projecthub-api 2>/dev/null || true
            
            # 使用 docker-compose 完整部署
            docker-compose -f docker-compose.prod.yml up -d --build
            
            echo "完成!"
            docker-compose -f docker-compose.prod.yml ps
