name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 递增版本号
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh
          cat version.json

      - name: 提交版本更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION version.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push origin main || echo "版本已是最新，无需提交"

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 复制版本信息到构建目录
        run: |
          cp version.json projecthub/
          cp version.json projecthub/dist/

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          debug: true
          script: |
            echo "===== SSH 连接测试成功 ====="
            echo "主机名: $(hostname)"
            echo "当前用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "Docker: $(docker --version 2>/dev/null || echo '未安装')"
            echo "Docker Compose: $(docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo '未安装')"
            df -h / | head -2

      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: false
          script: |
            echo "===== 开始部署 ====="

            # 使用正确的项目路径
            cd /opt/projecthub
            pwd

            # 更新代码
            echo "更新代码..."
            git fetch origin
            git reset --hard origin/main

            echo "文件列表:"
            ls -la

            # 使用现有的 .env 文件
            echo "使用现有 .env 配置..."
            if [ ! -f .env ]; then
              echo "MYSQL_ROOT_PASSWORD=ProjectHub@2026!Secure#Pass" > .env
              echo "DEEPSEEK_API_KEY=" >> .env
            fi

            # 生成版本信息（使用 sed 替换而不是追加）
            echo "生成版本信息..."
            VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
            BUILD_DATE=$(date +%Y-%m-%d)
            GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            
            # 使用 sed 更新或追加变量
            if grep -q "^APP_VERSION=" .env 2>/dev/null; then
              sed -i "s|^APP_VERSION=.*|APP_VERSION=$VERSION|" .env
            else
              echo "APP_VERSION=$VERSION" >> .env
            fi
            
            if grep -q "^BUILD_DATE=" .env 2>/dev/null; then
              sed -i "s|^BUILD_DATE=.*|BUILD_DATE=$BUILD_DATE|" .env
            else
              echo "BUILD_DATE=$BUILD_DATE" >> .env
            fi
            
            if grep -q "^GIT_COMMIT=" .env 2>/dev/null; then
              sed -i "s|^GIT_COMMIT=.*|GIT_COMMIT=$GIT_COMMIT|" .env
            else
              echo "GIT_COMMIT=$GIT_COMMIT" >> .env
            fi
            
            echo "版本: $VERSION, 构建日期: $BUILD_DATE, 提交: $GIT_COMMIT"

            # 部署
            echo "部署服务..."

            # 停止并删除旧的前端容器（保留 API 和 MySQL）
            docker stop projecthub-frontend 2>/dev/null || true
            docker rm -f projecthub-frontend 2>/dev/null || true

            # 构建前端镜像
            echo "构建前端镜像..."
            docker build \
              --build-arg APP_VERSION=$VERSION \
              --build-arg BUILD_DATE=$BUILD_DATE \
              --build-arg GIT_COMMIT=$GIT_COMMIT \
              -t projecthub-frontend:latest \
              ./projecthub

            # 使用现有网络（优先使用 projecthub_default）
            NETWORK_NAME="projecthub_default"
            if ! docker network inspect $NETWORK_NAME >/dev/null 2>&1; then
              NETWORK_NAME="projecthub-network"
              if ! docker network inspect $NETWORK_NAME >/dev/null 2>&1; then
                echo "创建项目网络..."
                NETWORK_NAME=$(docker network create projecthub-network)
              fi
            fi
            echo "使用网络: $NETWORK_NAME"

            # 停止并删除旧的前端容器
            echo "清理旧的前端容器..."
            docker stop projecthub-frontend 2>/dev/null || true
            docker rm projecthub-frontend 2>/dev/null || true

            # 启动前端容器（不绑定到特定端口，只在容器网络内）
            echo "启动前端容器..."
            docker run -d \
              --name projecthub-frontend \
              --network $NETWORK_NAME \
              --restart unless-stopped \
              projecthub-frontend:latest

            # 获取前端容器 IP
            sleep 2
            FRONTEND_IP=$(docker inspect projecthub-frontend --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null || echo "")
            echo "前端容器 IP: $FRONTEND_IP"

            # 部署 API 容器
            echo "部署 API 容器..."
            docker stop projecthub-api 2>/dev/null || true
            docker rm projecthub-api 2>/dev/null || true
            docker run -d \
              --name projecthub-api \
              --network $NETWORK_NAME \
              -e ConnectionStrings__DefaultConnection="Server=projecthub-mysql;Port=3306;Database=projecthub;User=root;Password=ProjectHub@2026!Secure#Pass" \
              -e DeepSeek__ApiKey="" \
              -p 8080:8080 \
              --restart unless-stopped \
              projecthub-api:latest

            # 获取 API 容器 IP
            sleep 2
            API_IP=$(docker inspect projecthub-api --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null || echo "")
            echo "API 容器 IP: $API_IP"

            # 更新 Nginx 配置
            echo "更新 Nginx 配置..."
            if [ -f /etc/nginx/sites-available/projecthub ]; then
              # 更新前端代理
              sudo sed -i "s|proxy_pass http://[^:]*:80;|proxy_pass http://$FRONTEND_IP:80;|g" /etc/nginx/sites-available/projecthub
              # 更新 API 代理
              sudo sed -i "s|proxy_pass http://[^:]*:8080;|proxy_pass http://$API_IP:8080;|g" /etc/nginx/sites-available/projecthub
              sudo nginx -t && sudo systemctl reload nginx
            fi

            echo "完成!"
            docker ps --filter "name=projecthub"