name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════
  # JOB 1: 后端测试 & 构建
  # ══════════════════════════════════════════
  build-api:
    name: "后端 - 发布"
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: 还原并发布
        run: |
          dotnet restore api/ProjectHub.Api.csproj
          dotnet publish api/ProjectHub.Api.csproj -c Release -o ./publish/api --no-restore

  # ══════════════════════════════════════════
  # JOB 2: 前端构建 & 推送镜像
  # ══════════════════════════════════════════
  build-frontend:
    name: "前端 - 构建 & 推送镜像"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送前端镜像
        run: |
          docker build -t "$REGISTRY/dream-black/projecthub-frontend:latest" -t "$REGISTRY/dream-black/projecthub-frontend:${{ github.sha }}" projecthub/
          docker push --all-tags "$REGISTRY/dream-black/projecthub-frontend"

  # ══════════════════════════════════════════
  # JOB 3: 部署到腾讯云服务器（仅 main/master push）
  # ══════════════════════════════════════════
  deploy:
    name: "部署到生产服务器"
    needs: [ build-api, build-frontend ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码（取 docker-compose.prod.yml）
        uses: actions/checkout@v4

      - name: SSH 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # 配置 SSH 使用 github_deploy 密钥
            mkdir -p ~/.ssh
            cat >> ~/.ssh/config << 'EOF'
Host github.com
    HostName github.com
    User git
    IdentityFile ~/.ssh/github_deploy
    StrictHostKeyChecking no
EOF
            chmod 600 ~/.ssh/config

            # 克隆最新代码
            git clone git@github.com:Dream-Black/user-manager.git /tmp/projecthub-latest
            cp /tmp/projecthub-latest/docker-compose.prod.yml /opt/projecthub/

            # 构建并发布后端
            if ! command -v dotnet &> /dev/null; then
              wget -q https://dot.net/v1/dotnet-install.sh -O /tmp/dotnet-install.sh
              chmod +x /tmp/dotnet-install.sh
              /tmp/dotnet-install.sh --channel 9.0 --install-dir /opt/dotnet
            fi
            export PATH="$PATH:/opt/dotnet"
            dotnet restore /tmp/projecthub-latest/api/ProjectHub.Api.csproj
            dotnet publish /tmp/projecthub-latest/api/ProjectHub.Api.csproj -c Release -o /opt/projecthub/api-publish --no-restore

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 重启前端
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            # 重启后端
            pkill -f "dotnet.*ProjectHub.Api" || true
            sleep 1
            cd /opt/projecthub/api-publish
            MYSQL_ROOT_PASSWORD="${MYSQL_ROOT_PASSWORD:-chennan}" \
            ConnectionStrings__DefaultConnection="Server=mysql;Port=3306;Database=projecthub;User=root;Password=${MYSQL_ROOT_PASSWORD:-chennan}" \
              nohup dotnet ProjectHub.Api.dll > /opt/projecthub/api.log 2>&1 &
            sleep 5
            curl -sf http://localhost:5000/swagger/index.html && echo "✅ 部署完成！$(date)" || cat /opt/projecthub/api.log

            docker image prune -f
            echo "✅ 部署完成！$(date)"
