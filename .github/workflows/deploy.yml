name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════
  # JOB 1: 后端测试 & 构建
  # ══════════════════════════════════════════
  build-api:
    name: "后端 - 发布"
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: 还原并发布
        run: |
          dotnet restore api/ProjectHub.Api.csproj
          dotnet publish api/ProjectHub.Api.csproj -c Release -o ./publish/api --no-restore

      - name: 打包发布产物
        run: tar -czf api-publish.tar.gz -C ./publish/api .

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: api-publish.tar.gz
          retention-days: 1

  # ══════════════════════════════════════════
  # JOB 2: 前端构建 & 推送镜像
  # ══════════════════════════════════════════
  build-frontend:
    name: "前端 - 构建 & 推送镜像"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送前端镜像
        run: |
          docker build -t "$REGISTRY/dream-black/projecthub-frontend:latest" -t "$REGISTRY/dream-black/projecthub-frontend:${{ github.sha }}" projecthub/
          docker push --all-tags "$REGISTRY/dream-black/projecthub-frontend"

  # ══════════════════════════════════════════
  # JOB 3: 部署到腾讯云服务器（仅 main/master push）
  # ══════════════════════════════════════════
  deploy:
    name: "部署到生产服务器"
    needs: [ build-api, build-frontend ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码（取 docker-compose.prod.yml）
        uses: actions/checkout@v4

      - name: 下载后端产物
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./api-publish/

      - name: SSH 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/projecthub

            # 拉取最新配置
            git pull origin main || git pull origin master

            # 解压后端产物
            mkdir -p /opt/projecthub/api-publish
            tar -xzf api-publish/api-publish.tar.gz -C /opt/projecthub/api-publish/

            # 登录 GHCR 拉取最新前端镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 重启前端容器
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            # 重启后端：先停旧进程，再启动新进程
            pkill -f "dotnet.*ProjectHub.Api" || true
            cd /opt/projecthub/api-publish
            MYSQL_PWD="${MYSQL_ROOT_PASSWORD:-chennan}" \
            ConnectionStrings__DefaultConnection="Server=mysql;Port=3306;Database=projecthub;User=root;Password=${MYSQL_ROOT_PASSWORD:-chennan}" \
              nohup dotnet ProjectHub.Api.dll \
              > /opt/projecthub/api.log 2>&1 &
            sleep 5
            curl -sf http://localhost:5000/swagger/index.html && echo "✅ API 启动成功" || echo "⚠️ API 可能未正常启动，请检查 /opt/projecthub/api.log"

            docker image prune -f
            echo "✅ 部署完成！$(date)"
