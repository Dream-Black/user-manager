name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 递增版本号
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh
          cat version.json

      - name: 提交版本更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION version.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push origin main || echo "版本已是最新，无需提交"

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 复制版本信息到构建目录
        run: cp version.json projecthub/dist/

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          debug: true
          script: |
            echo "===== SSH 连接测试成功 ====="
            echo "主机名: $(hostname)"
            echo "当前用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "Docker: $(docker --version 2>/dev/null || echo '未安装')"
            echo "Docker Compose: $(docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo '未安装')"
            df -h / | head -2
            
      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: false
          script: |
            echo "===== 开始部署 ====="
            
            # 创建目录
            mkdir -p ~/projecthub
            cd ~/projecthub
            pwd
            
            # 克隆代码
            echo "克隆代码..."
            cd ~
            rm -rf ~/projecthub
            mkdir -p ~/projecthub
            cd ~/projecthub
            git clone https://github.com/Dream-Black/user-manager.git .
            
            echo "文件列表:"
            ls -la
            
            # 创建 .env
            echo "创建 .env..."
            echo "MYSQL_ROOT_PASSWORD=chennan" > .env
            echo "DEEPSEEK_API_KEY=" >> .env
            
            # 部署
            echo "部署服务..."
            # 强制清理所有相关容器和网络
            docker-compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            docker stop $(docker ps -q --filter "name=projecthub") 2>/dev/null || true
            docker rm -f $(docker ps -aq --filter "name=projecthub") 2>/dev/null || true
            # 使用 docker-compose 重新部署
            docker-compose -f docker-compose.prod.yml up -d --build
            
            echo "完成!"
            docker-compose -f docker-compose.prod.yml ps
