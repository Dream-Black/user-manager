name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: true
          script: |
            set -e
            echo "===== 系统诊断 ====="
            echo "主机: $(hostname)"
            echo "当前目录: $(pwd)"
            echo "当前用户: $(whoami)"
            echo "Docker 版本: $(docker --version 2>/dev/null || echo 'Docker 未安装')"
            echo "Docker Compose 版本: $(docker compose version 2>/dev/null || echo 'Docker Compose 未安装')"
            echo "磁盘空间:"
            df -h /
            echo ""
            echo "===== 准备部署目录 ====="
            
            # 创建并进入项目目录
            sudo mkdir -p /opt/projecthub
            cd /opt/projecthub
            
            # 如果目录为空或没有 .git，使用 HTTPS 克隆
            if [ ! -d .git ]; then
              echo "目录为空，克隆代码..."
              sudo rm -rf /opt/projecthub/* /opt/projecthub/.* 2>/dev/null || true
              git clone https://github.com/Dream-Black/user-manager.git /opt/projecthub
            else
              echo "更新代码..."
              git fetch origin
              git reset --hard origin/main
            fi
            
            echo ""
            echo "===== 检查文件 ====="
            ls -la /opt/projecthub/
            echo ""
            
            # 确保 .env 文件存在
            if [ ! -f .env ]; then
              echo "创建 .env 文件..."
              echo "MYSQL_ROOT_PASSWORD=chennan" > .env
              echo "DEEPSEEK_API_KEY=" >> .env
              cat .env
            fi
            
            echo ""
            echo "===== 停止旧容器 ====="
            docker compose -f docker-compose.prod.yml down 2>/dev/null || echo "没有运行中的容器"
            
            echo ""
            echo "===== 启动服务 ====="
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo ""
            echo "===== 等待服务启动 ====="
            sleep 15
            
            echo ""
            echo "===== 部署完成 - 容器状态 ====="
            docker compose -f docker-compose.prod.yml ps
            
            echo ""
            echo "===== 服务日志 ====="
            docker compose -f docker-compose.prod.yml logs --tail=30
