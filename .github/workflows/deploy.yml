name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: "构建"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 前端
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: projecthub
        run: npm install

      - name: 构建前端
        working-directory: projecthub
        run: npm run build

      - name: 构建并打包 Docker 镜像
        run: |
          docker build -t frontend:latest projecthub/
          docker save frontend:latest | gzip > frontend.tar.gz
          du -sh frontend.tar.gz

      - name: 上传镜像包
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz
          retention-days: 1

  deploy:
    name: "部署到生产服务器"
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          debug: true
          script: |
            echo "===== SSH 连接测试成功 ====="
            echo "主机名: $(hostname)"
            echo "当前用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "Docker: $(docker --version 2>/dev/null || echo '未安装')"
            echo "Docker Compose: $(docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo '未安装')"
            df -h / | head -2
            
      - name: 部署到腾讯云
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          debug: false
          script: |
            set -x  # 启用调试输出
            
            echo "===== 准备部署目录 ====="
            # 创建项目目录
            if [ ! -d /opt/projecthub ]; then
              sudo mkdir -p /opt/projecthub
              sudo chown $(whoami):$(whoami) /opt/projecthub
            fi
            
            cd /opt/projecthub
            echo "当前目录: $(pwd)"
            
            # 克隆或更新代码
            if [ ! -d .git ]; then
              echo "克隆代码..."
              rm -rf /opt/projecthub/* 2>/dev/null || true
              git clone https://github.com/Dream-Black/user-manager.git .
            else
              echo "更新代码..."
              git reset --hard HEAD
              git pull origin main
            fi
            
            echo ""
            echo "===== 目录内容 ====="
            ls -la
            
            # 创建 .env 文件
            if [ ! -f .env ]; then
              echo "创建 .env 文件..."
              echo "MYSQL_ROOT_PASSWORD=chennan" > .env
              echo "DEEPSEEK_API_KEY=" >> .env
            fi
            
            echo ""
            echo "===== 停止旧服务 ====="
            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            
            echo ""
            echo "===== 启动新服务 ====="
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo ""
            echo "===== 部署完成 ====="
            docker compose -f docker-compose.prod.yml ps
