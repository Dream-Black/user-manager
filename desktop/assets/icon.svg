<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="#1a1a2e"/>

  <!-- 爪子轮廓 -->
  <g fill="#00d4ff">
    <!-- 主掌 -->
    <ellipse cx="128" cy="150" rx="55" ry="45"/>

    <!-- 上方三个脚趾 -->
    <ellipse cx="85" cy="85" rx="22" ry="28" transform="rotate(-20 85 85)"/>
    <ellipse cx="128" cy="70" rx="22" ry="30"/>
    <ellipse cx="171" cy="85" rx="22" ry="28" transform="rotate(20 171 85)"/>

    <!-- 下方两个小脚趾 -->
    <ellipse cx="95" cy="115" rx="15" ry="20" transform="rotate(-35 95 115)"/>
    <ellipse cx="161" cy="115" rx="15" ry="20" transform="rotate(35 161 115)"/>
  </g>

  <!-- AI 发光效果 -->
  <circle cx="128" cy="130" r="25" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.8">
    <animate attributeName="r" values="20;28;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- 文字 -->
  <text x="128" y="225" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">AI Claw</text>
</svg>
